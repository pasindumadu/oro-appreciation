<!DOCTYPE html>
<html>
<head>
  <title>ORO Appreciation</title>
  <style>
  body {
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    padding: 40px;
    margin: 0;

    /* Dark gradient background */
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #ecf0f1;
  }

  /* Subtle grid overlay (OR vibe) */
  body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: 
      linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    top: 0;
    left: 0;
    z-index: 0;
  }

  h2 {
    font-size: 28px;
    margin-bottom: 20px;
    z-index: 1;
    position: relative;
  }

  input, button, textarea {
    padding: 12px;
    margin: 10px;
    width: 260px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 14px;
  }

  input, textarea {
    background: #ecf0f1;
    color: #2c3e50;
  }

  button {
    background: #1abc9c;
    color: white;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background: #16a085;
    transform: scale(1.05);
  }

  #result {
    margin-top: 25px;
    background: rgba(255, 255, 255, 0.1);
    padding: 25px;
    border-radius: 15px;
    display: none;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    position: relative;
    z-index: 1;
  }

  h3 {
    margin-bottom: 10px;
  }

  p {
    line-height: 1.5;
  }

  textarea {
    resize: none;
  }
</style>
</head>
<body>

<h2>🎓 ORO Module Appreciation</h2>

<input type="text" id="studentId" placeholder="Enter your University ID">
<br>
<button onclick="getStudent()">View Message</button>

<div id="result">
  <h3 id="name"></h3>
  <p id="message"></p>

  <h4>💬 Leave a comment</h4>
  <textarea id="comment" placeholder="Your feedback..."></textarea><br>
  <button onclick="submitComment()">Submit</button>
</div>

<script>
const SHEET_URL = "https://opensheet.elk.sh/1s4yNOENtViTOkcHeJbGrfL1bBl3sPIHW94_W55fxxG0/Sheet1";

async function getStudent() {
  const id = document.getElementById("studentId").value.trim();

  const res = await fetch(SHEET_URL);
  const data = await res.json();

  const student = data.find(row => row.ID === id);

  if (student) {
    document.getElementById("name").innerText = `Hi ${student.Name} 👋`;
    document.getElementById("message").innerText =
      "Thank you for your active participation and dedication throughout the ORO module. Your effort, engagement, and willingness to learn were truly appreciated. Wishing you all the best for your future!";
    
    document.getElementById("result").style.display = "block";
  } else {
    alert("ID not found");
  }
}

async function submitComment() {
  const comment = document.getElementById("comment").value;
  const id = document.getElementById("studentId").value;

  await fetch("https://script.google.com/macros/s/AKfycbxQoI5dmydnPDxL5fY6FnRmdlsSj8Sl7T6f9TUd7f-XWcjZFFEGCVNeF3bbOAPzayfI/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({ id, comment }),
  });

  alert("Thank you for your feedback!");
}
</script>

</body>
</html>
