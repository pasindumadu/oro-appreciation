<!DOCTYPE html>
<html>
<head>
  <title>ORO Appreciation</title>

  <!-- 🔥 IMPORTANT FOR MOBILE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 20px;
      margin: 0;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #ecf0f1;
    }

    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    body > *:not(#bgCanvas) {
      position: relative;
      z-index: 1;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 15px;
      line-height: 1.4;
    }

    .container {
      max-width: 420px;
      margin: auto;
    }

    input, button, textarea {
      padding: 14px;
      margin: 10px 0;
      width: 100%;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    input, textarea {
      background: #ecf0f1;
      color: #2c3e50;
    }

    button {
      background: #1abc9c;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    button:hover {
      background: #16a085;
    }

    #result {
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      display: none;
    }

    textarea {
      resize: none;
    }

    #successMsg {
      margin-top: 10px;
      color: #2ecc71;
      font-weight: bold;
      display: none;
    }

    @media (min-width: 768px) {
      h2 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div class="container">

  <h2 id="title">🎓 Operational Research & Optimization<br>Appreciation</h2>

  <input type="text" id="studentId" placeholder="Enter your University ID">
  
  <button onclick="getStudent()">View Message</button>

  <div id="result">
    <h3 id="name"></h3>
    <p id="message"></p>

    <h4>💬 Leave a comment</h4>
    <textarea id="comment" placeholder="Your feedback..."></textarea>
    <button onclick="submitComment()">Submit</button>

    <div id="successMsg">✅ Feedback received. Thank you!</div>

    <p style="margin-top:15px; font-size:12px; opacity:0.8;">
      – Pasindu Madhuranga<br>
      Lecturer, School of Computing, IIT.
    </p>
  </div>

</div>

<script>
const SHEET_URL = "https://opensheet.elk.sh/1s4yNOENtViTOkcHeJbGrfL1bBl3sPIHW94_W55fxxG0/Sheet1";

let studentsData = [];

async function loadData() {
  document.getElementById("title").innerText = "Loading...";
  const res = await fetch(SHEET_URL);
  studentsData = await res.json();
  document.getElementById("title").innerHTML =
    "🎓 Operational Research & Optimization<br>Appreciation";
}
loadData();

function getStudent() {
  const id = document.getElementById("studentId").value;

  const student = studentsData.find(row => 
    String(row.ID).replace(/\s+/g, '').toLowerCase() === 
    id.replace(/\s+/g, '').toLowerCase()
  );

  if (student) {
    document.getElementById("name").innerText = `Hi ${student.Name} 👋`;
    document.getElementById("message").innerText =
      "Thank you for your active participation and dedication throughout the ORO module. Your effort, engagement, and willingness to learn were truly appreciated. Wishing you all the best for your future!";
    
    document.getElementById("result").style.display = "block";
  } else {
    alert("ID not found");
  }
}

function submitComment() {
  const comment = document.getElementById("comment").value;
  const id = document.getElementById("studentId").value;

  if (!comment) {
    alert("Please enter a comment");
    return;
  }

  document.getElementById("successMsg").style.display = "block";
  document.getElementById("comment").value = "";

  fetch("https://script.google.com/macros/s/AKfycbxQoI5dmydnPDxL5fY6FnRmdlsSj8Sl7T6f9TUd7f-XWcjZFFEGCVNeF3bbOAPzayfI/exec", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id: id, comment: comment }),
  });
}

/* Mobile-optimized animation */
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

/* Reduce nodes on mobile for performance */
let nodeCount = window.innerWidth < 600 ? 20 : 40;

let nodes = [];
for (let i = 0; i < nodeCount; i++) {
  nodes.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    dx: (Math.random() - 0.5),
    dy: (Math.random() - 0.5)
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      let dx = nodes[i].x - nodes[j].x;
      let dy = nodes[i].y - nodes[j].y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 100) {
        ctx.beginPath();
        ctx.strokeStyle = "rgba(26, 188, 156, 0.15)";
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.stroke();
      }
    }
  }

  nodes.forEach(node => {
    ctx.beginPath();
    ctx.arc(node.x, node.y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = "#1abc9c";
    ctx.fill();

    node.x += node.dx;
    node.y += node.dy;

    if (node.x < 0 || node.x > canvas.width) node.dx *= -1;
    if (node.y < 0 || node.y > canvas.height) node.dy *= -1;
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
