<!DOCTYPE html>
<html>
<head>
  <title>ORO Appreciation</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 40px;
      margin: 0;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #ecf0f1;
      overflow-x: hidden;
    }

    /* Canvas background */
    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Ensure content is above animation */
    body > * {
      position: relative;
      z-index: 1;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    input, button, textarea {
      padding: 12px;
      margin: 10px;
      width: 260px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    input, textarea {
      background: #ecf0f1;
      color: #2c3e50;
    }

    button {
      background: #1abc9c;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a085;
      transform: scale(1.05);
    }

    #result {
      margin-top: 25px;
      background: rgba(255, 255, 255, 0.1);
      padding: 25px;
      border-radius: 15px;
      display: none;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    textarea {
      resize: none;
    }
  </style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<h2>🎓 Operational Research & Optimization<br>Appreciation</h2>

<input type="text" id="studentId" placeholder="Enter your University ID">
<br>
<button onclick="getStudent()">View Message</button>

<div id="result">
  <h3 id="name"></h3>
  <p id="message"></p>

  <h4>💬 Leave a comment</h4>
  <textarea id="comment" placeholder="Your feedback..."></textarea><br>
  <button onclick="submitComment()">Submit</button>

  <p style="margin-top:15px; font-size:12px; opacity:0.8;">
    – Imesh Pathirana<br>
    Assistant Lecturer
  </p>
</div>

<script>
/* =========================
   STUDENT FETCH LOGIC
========================= */

const SHEET_URL = "https://opensheet.elk.sh/1s4yNOENtViTOkcHeJbGrfL1bBl3sPIHW94_W55fxxG0/Sheet1";

async function getStudent() {
  const id = document.getElementById("studentId").value.trim();

  const res = await fetch(SHEET_URL);
  const data = await res.json();

  const student = data.find(row => row.ID === id);

  if (student) {
    document.getElementById("name").innerText = `Hi ${student.Name} 👋`;
    document.getElementById("message").innerText =
      "Thank you for your active participation and dedication throughout the ORO module. Your effort, engagement, and willingness to learn were truly appreciated. Wishing you all the best for your future!";
    
    document.getElementById("result").style.display = "block";
  } else {
    alert("ID not found");
  }
}

/* =========================
   COMMENT SUBMISSION
========================= */

async function submitComment() {
  const comment = document.getElementById("comment").value;
  const id = document.getElementById("studentId").value;

  if (!comment) {
    alert("Please enter a comment");
    return;
  }

  await fetch("https://script.google.com/macros/s/AKfycbxQoI5dmydnPDxL5fY6FnRmdlsSj8Sl7T6f9TUd7f-XWcjZFFEGCVNeF3bbOAPzayfI/exec", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id: id, comment: comment }),
  });

  alert("Thank you for your feedback!");
}

/* =========================
   ANIMATED OR BACKGROUND
========================= */

const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let nodes = [];

for (let i = 0; i < 40; i++) {
  nodes.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    dx: (Math.random() - 0.5) * 1,
    dy: (Math.random() - 0.5) * 1
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw connections
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      let dx = nodes[i].x - nodes[j].x;
      let dy = nodes[i].y - nodes[j].y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 120) {
        ctx.beginPath();
        ctx.strokeStyle = "rgba(26, 188, 156, 0.2)";
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.stroke();
      }
    }
  }

  // Draw nodes
  nodes.forEach(node => {
    ctx.beginPath();
    ctx.arc(node.x, node.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = "#1abc9c";
    ctx.fill();

    node.x += node.dx;
    node.y += node.dy;

    if (node.x < 0 || node.x > canvas.width) node.dx *= -1;
    if (node.y < 0 || node.y > canvas.height) node.dy *= -1;
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
